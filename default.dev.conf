http {
	server {
		client_max_body_size 20m;
		listen 8080;
		server_name _;
		index index.html;
		autoindex on;

		location / {
			root ./static;
			index index.html;
			allow_methods POST;
		}

		location /a {
			root ./static;
			index index.html;
			allow_methods GET POST;
		}

		location /abc {
			root ./static;
			index index.html;
			allow_methods GET POST;
		}

		location /ccc {
			root ./static;
			allow_methods GET POST;
		}

		# autoindex 확인용 디렉토리 (index.html 없음)
		location /files {
			root ./static/files;
			allow_methods GET;
		}
	}
}
